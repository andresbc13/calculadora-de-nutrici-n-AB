<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AB Strength & Conditioning — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: 'Outfit', sans-serif;
  background: #08080a;
  color: #f0ece0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(212,175,55,0.05) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(212,175,55,0.04) 0%, transparent 60%);
  pointer-events: none;
}
.login-card {
  background: #111115;
  border: 1px solid #2a2a30;
  border-radius: 16px;
  padding: 2.5rem 2rem;
  width: 100%;
  max-width: 400px;
  position: relative;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}
.login-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(135deg, #d4af37, #e8ce6a);
  border-radius: 16px 16px 0 0;
}
.login-logo {
  text-align: center;
  margin-bottom: 2rem;
}
.login-logo h1 {
  font-size: 1.3rem;
  font-weight: 800;
  background: linear-gradient(135deg, #d4af37, #e8ce6a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.02em;
}
.login-logo p {
  font-size: 0.72rem;
  color: #6b6860;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 0.3rem;
}
.tabs {
  display: flex;
  border-bottom: 1.5px solid #2a2a30;
  margin-bottom: 1.75rem;
}
.tab {
  flex: 1;
  padding: 0.6rem;
  text-align: center;
  font-size: 0.85rem;
  font-weight: 600;
  color: #6b6860;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1.5px;
  transition: all 0.2s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: 'Outfit', sans-serif;
}
.tab.active { color: #d4af37; border-bottom-color: #d4af37; }
.form-group {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
  margin-bottom: 1rem;
}
.form-group label {
  font-size: 0.72rem;
  font-weight: 600;
  color: #a8a498;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
input {
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  padding: 0.65rem 0.85rem;
  border: 1.5px solid #2a2a30;
  border-radius: 8px;
  background: #1a1a22;
  color: #f0ece0;
  outline: none;
  transition: all 0.2s;
  width: 100%;
}
input:focus {
  border-color: #c9a02e;
  box-shadow: 0 0 0 3px rgba(212,175,55,0.12);
  background: #18181e;
}
.btn-submit {
  width: 100%;
  padding: 0.75rem;
  background: linear-gradient(135deg, #d4af37, #e8ce6a);
  color: #0a0a0a;
  border: none;
  border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 0.5rem;
  box-shadow: 0 2px 10px rgba(212,175,55,0.2);
}
.btn-submit:hover { box-shadow: 0 4px 20px rgba(212,175,55,0.35); transform: translateY(-1px); }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.msg {
  margin-top: 1rem;
  padding: 0.7rem 1rem;
  border-radius: 8px;
  font-size: 0.8rem;
  display: none;
}
.msg.error { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.2); display: block; }
.msg.success { background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.2); display: block; }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <h1>AB Strength & Conditioning</h1>
    <p>Calculadora de Nutrición Deportiva</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('login', this)">Iniciar sesión</button>
    <button class="tab" onclick="showTab('register', this)">Crear cuenta</button>
  </div>

  <!-- LOGIN FORM -->
  <div id="form-login">
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="login-email" placeholder="tu@correo.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-submit" id="btn-login" onclick="handleLogin()">Entrar</button>
    <div class="msg" id="msg-login"></div>
  </div>

  <!-- REGISTER FORM -->
  <div id="form-register" style="display:none;">
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="reg-email" placeholder="tu@correo.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
    </div>
    <button class="btn-submit" id="btn-register" onclick="handleRegister()">Crear cuenta</button>
    <div class="msg" id="msg-register"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://wkpzibrkvjeabfxlkryw.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_eHYhxVTeKdVlqqEKEVdT9A_azdrOA0E';
const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Redirect if already logged in
sbClient.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'index.html';
});

function showTab(tab, el) {
  document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('btn-login');
  const msg = document.getElementById('msg-login');

  if (!email || !password) { showMsg(msg, 'Completa todos los campos.', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'Ingresando...';

  const { error } = await sbClient.auth.signInWithPassword({ email, password });

  if (error) {
    showMsg(msg, 'Correo o contraseña incorrectos.', 'error');
    btn.disabled = false;
    btn.textContent = 'Entrar';
  } else {
    window.location.href = 'index.html';
  }
}

async function handleRegister() {
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const btn = document.getElementById('btn-register');
  const msg = document.getElementById('msg-register');

  if (!email || !password) { showMsg(msg, 'Completa todos los campos.', 'error'); return; }
  if (password.length < 6) { showMsg(msg, 'La contraseña debe tener al menos 6 caracteres.', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'Creando cuenta...';

  const { error } = await sbClient.auth.signUp({ email, password });

  if (error) {
    showMsg(msg, error.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Crear cuenta';
  } else {
    showMsg(msg, '¡Cuenta creada! Revisa tu correo para confirmar.', 'success');
    btn.disabled = false;
    btn.textContent = 'Crear cuenta';
  }
}

function showMsg(el, text, type) {
  el.textContent = text;
  el.className = 'msg ' + type;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const loginVisible = document.getElementById('form-login').style.display !== 'none';
    if (loginVisible) handleLogin(); else handleRegister();
  }
});
</script>
</body>
</html>
